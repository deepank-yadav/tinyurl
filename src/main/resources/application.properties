spring.application.name=tinyurl
# Server
server.port=8080

# Application base URL (used in generated short links)
app.base-url=http://localhost:8080

# H2 in-memory database (replace with real DB config in production)
spring.datasource.url=jdbc:h2:mem:tinyurldb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console (http://localhost:8080/h2-console) ? disable in production
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ?? Swagger UI / SpringDoc ????????????????????????????????????????????????????
# Swagger UI  ? http://localhost:8080/swagger-ui.html
# OpenAPI JSON? http://localhost:8080/v3/api-docs
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true

# ?? DevTools ??????????????????????????????????????????????????????????????????
# Automatically restarts the app when classes change (works with your IDE's build)
spring.devtools.restart.enabled=true
# LiveReload browser extension support (http://livereload.com/extensions/)
spring.devtools.livereload.enabled=true